# Load balancer for the two-instance scaling demo.
#
# Clients connect with transports: ['websocket'] only, so no sticky sessions
# are required: a websocket is a single long-lived TCP connection and every
# frame of a session arrives at the same upstream. Long-polling fallback would
# break this (each poll is a fresh HTTP request that could land on a different
# instance), which is why the client disables it. See docs/ARCHITECTURE.md.

worker_processes auto;

events {
  worker_connections 4096;
}

http {
  upstream parley_servers {
    least_conn;
    server server-a:4000;
    server server-b:4000;
  }

  server {
    listen 4000;

    location / {
      proxy_pass http://parley_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 75s;
      proxy_send_timeout 75s;
    }
  }
}
